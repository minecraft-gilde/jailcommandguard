# Alle hier eingetragenen Befehle bleiben fuer gejailte Spieler erlaubt.
# Wichtig: Trage auch Aliase ein, die du erlauben willst.
allowed-commands:
  - msg
  - tell
  - w
  - r
  - reply
  - help

blocked-message: "&cDu kannst diesen Befehl im Gefängnis nicht benutzen."

# Entfernt nicht erlaubte Befehle zusaetzlich aus der Befehlsliste / Tab-Completion.
hide-disallowed-commands: true

jail-time-reminder:
  # Schaltet die periodische Restzeit-Nachricht ein oder aus.
  enabled: true
  # Intervall in Minuten. Werte < 1 werden intern auf 1 gesetzt.
  interval-minutes: 1
  # Verfuegbare Platzhalter:
  # %minutes% -> verbleibende Minuten (aufgerundet)
  # %formatted_time% -> Restzeit als ganze Minuten (z. B. "5 Minuten")
  message: "&eDu musst noch &6%formatted_time% &eim Gefängnis bleiben."

debug-respawn:
  # Schaltet detaillierte Debug-Logs fuer Death/Respawn/Jail-Teleports ein.
  # Nur fuer Fehlersuche aktivieren, da die Logs sonst schnell wachsen koennen.
  enabled: false
